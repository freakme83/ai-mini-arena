name: Run AI Mini Arena Match

on:
  workflow_dispatch:

jobs:
  run-match:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run match
        run: npm run match
